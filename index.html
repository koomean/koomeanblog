<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koo Mean Space</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            /* โทนสีหลัก (OLED Black Theme) */
            --bg-body: #000000;
            --bg-container: #000000;
            --bg-card: #16181c;
            --bg-card-hover: #1c1f23;
            --border: #2f3336;
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --accent: #1d9bf0;
            --accent-hover: #1a8cd8;
            --success: #00ba7c;
            --danger: #f4212e;
            
            /* Glassmorphism */
            --glass-bg: rgba(0, 0, 0, 0.65);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-y: scroll; /* ป้องกันเนื้อหากระโดดตอน scrollbar ขึ้น */
        }

        /* --- Layout หลัก (ตรงกลางจอ) --- */
        .app-container {
            width: 100%;
            max-width: 600px; /* ความกว้างมาตรฐานของ Feed */
            min-height: 100vh;
            background-color: var(--bg-container);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* เอา border ออกเวลากางบนมือถือ */
        @media (max-width: 600px) {
            .app-container {
                border-left: none;
                border-right: none;
            }
        }

        /* --- Header (Sticky) --- */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .auth-btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        /* --- Profile Section --- */
        .profile-header {
            position: relative;
            border-bottom: 1px solid var(--border);
        }
        .profile-cover {
            height: 150px;
            background: linear-gradient(135deg, #1d9bf033 0%, #000000 100%);
            width: 100%;
        }
        @media (max-width: 600px) {
            .profile-cover { height: 120px; }
        }
        .profile-info-wrap {
            padding: 12px 16px 16px;
            position: relative;
        }
        .profile-avatar-wrap {
            position: absolute;
            top: -65px;
            left: 16px;
            border-radius: 50%;
            padding: 4px;
            background-color: var(--bg-container);
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--border); /* สีรอโหลด */
        }
        @media (max-width: 600px) {
            .profile-avatar-wrap { top: -50px; }
            .profile-avatar { width: 90px; height: 90px; }
        }
        /* ดันเนื้อหาโปรไฟล์ลงมาไม่ให้ทับรูป */
        .profile-text-content {
            margin-top: 60px; 
        }
        @media (max-width: 600px) {
            .profile-text-content { margin-top: 40px; }
        }
        .profile-name-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .profile-name {
            font-size: 1.25rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .verified-badge {
            color: var(--accent);
            font-size: 1rem;
            margin-top: 2px;
        }
        .profile-handle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 2px;
        }
        .profile-bio {
            margin-top: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text-primary);
        }

        /* --- Post Creator (Admin Only) --- */
        .post-creator {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: none; /* ซ่อนตอนแรก */
            background-color: var(--bg-container);
        }
        .creator-flex {
            display: flex;
            gap: 12px;
        }
        .creator-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .creator-input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .creator-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            line-height: 1.4;
            resize: none;
            outline: none;
            min-height: 50px;
            padding-top: 8px;
        }
        .creator-textarea::placeholder {
            color: var(--text-secondary);
        }
        .creator-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }
        .btn-post {
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 9999px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-post:hover { background-color: var(--accent-hover); }
        .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Feed Section --- */
        .feed-container {
            flex: 1;
            padding-bottom: 50px;
        }
        .post-card {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .post-card:hover {
            background-color: var(--bg-card-hover);
        }
        .post-card-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .post-card-content {
            flex: 1;
            min-width: 0; /* ป้องกัน text overflow ดัน layout */
        }
        .post-card-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 4px;
        }
        .post-card-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .post-card-time {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .post-card-text {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* --- Loading & States --- */
        .status-message {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Modal (Login) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .modal-box {
            transform: translateY(0);
        }
        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .btn-close-modal {
            margin-top: 24px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .btn-close-modal:hover {
            background-color: rgba(255,255,255,0.05);
        }
        
        /* แก้ปัญหากล่อง Google Login ล้น */
        #g_id_onload, .g_id_signin {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-title">Koo Mean Space</div>
            <button class="auth-btn" id="loginToggleBtn">Sign In</button>
        </header>

        <section class="profile-header">
            <div class="profile-cover"></div>
            <div class="profile-info-wrap">
                <div class="profile-avatar-wrap">
                    <img src="https://ui-avatars.com/api/?name=KM&background=16181c&color=e7e9ea&size=200" alt="Profile" class="profile-avatar" id="main-profile-img">
                </div>
                
                <div class="profile-text-content">
                    <div class="profile-name-row">
                        <h1 class="profile-name" id="profile-name-text">Loading...</h1>
                        <i class="fas fa-certificate verified-badge"></i>
                    </div>
                    <div class="profile-handle" id="profile-handle">@koomean</div>
                    <div class="profile-bio" id="profile-bio">...</div>
                </div>
            </div>
        </section>

        <section class="post-creator" id="post-creator">
            <div class="creator-flex">
                <img src="https://ui-avatars.com/api/?name=A" alt="Admin" class="creator-avatar" id="creator-avatar">
                <div class="creator-input-area">
                    <textarea id="new-post-content" class="creator-textarea" placeholder="คุณมีน กำลังคิดอะไรอยู่..."></textarea>
                    <div class="creator-actions">
                        <button class="btn-post" id="submit-post-btn" onclick="submitPost()">Post</button>
                    </div>
                </div>
            </div>
        </section>

        <main class="feed-container" id="feed-container">
            <div class="status-message">
                <div class="spinner"></div>
                กำลังโหลดไทม์ไลน์...
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-box">
            <h2 class="modal-title">Admin Sign In</h2>
            <div id="g_id_onload"
                data-client_id="906677442222-kmjgsmta70n24aoaq7osm9c1l7g1fb89.apps.googleusercontent.com"
                data-callback="handleCredentialResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>
            <button class="btn-close-modal" id="close-modal-btn">ยกเลิก</button>
        </div>
    </div>

    <script>
    // --- Configuration ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwBYhFTW68AfN4cYUJYS1DG7vw-Ocykx5kslSUQIeJJlfu0oeBIdi9xAhVmorVWQ4q7rg/exec";
    
    // --- State Management ---
    let state = { 
        isLoggedIn: false, 
        currentUser: null, 
        profile: {
            name: "Koo Mean",
            imageUrl: "https://ui-avatars.com/api/?name=KM&background=1d9bf0&color=fff&size=200"
        }, 
        posts: [] 
    };

    // --- DOM Elements ---
    const els = {
        loginBtn: document.getElementById('loginToggleBtn'),
        modal: document.getElementById('login-modal'),
        closeModal: document.getElementById('close-modal-btn'),
        creatorBox: document.getElementById('post-creator'),
        creatorAvatar: document.getElementById('creator-avatar'),
        postInput: document.getElementById('new-post-content'),
        postSubmit: document.getElementById('submit-post-btn'),
        feed: document.getElementById('feed-container'),
        profImg: document.getElementById('main-profile-img'),
        profName: document.getElementById('profile-name-text'),
        profBio: document.getElementById('profile-bio')
    };

    // --- Utils ---
    function decodeJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        } catch { return null; }
    }

    function escapeHTML(str) {
        if (!str) return '';
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    }

    function showSpinner(text) {
        els.feed.innerHTML = `
            <div class="status-message">
                <div class="spinner"></div>
                ${text}
            </div>
        `;
    }

    // --- Auto Resize Textarea ---
    els.postInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // --- Auth Handlers ---
    els.loginBtn.addEventListener('click', () => {
        if (!state.isLoggedIn) {
            els.modal.classList.add('show');
        } else {
            if(confirm("ต้องการออกจากระบบหรือไม่?")) {
                state.isLoggedIn = false;
                state.currentUser = null;
                els.loginBtn.innerText = 'Sign In';
                els.creatorBox.style.display = 'none';
                els.postInput.value = '';
            }
        }
    });

    els.closeModal.addEventListener('click', () => {
        els.modal.classList.remove('show');
    });

    // เรียกเมื่อ Login สำเร็จ
    function handleCredentialResponse(res) {
        const payload = decodeJwt(res.credential);
        els.modal.classList.remove('show');
        showSpinner('กำลังตรวจสอบสิทธิ์...');
        
        // โหลดข้อมูลใหม่พร้อมส่ง Email ไปเช็คสิทธิ์
        loadData(payload.email, payload.picture);
    }

    // --- Data Fetching ---
    async function loadData(userEmail = '', userPic = '') {
        try {
            let url = API_URL;
            if (userEmail) url += `?email=${encodeURIComponent(userEmail)}`;

            const res = await fetch(url);
            if (!res.ok) throw new Error('Network response was not ok');
            const data = await res.json();

            // 1. อัปเดต Profile
            if (data.profile && data.profile.name) {
                state.profile.name = data.profile.name;
                // อัปเดตรูปภาพ: ถ้ามี URL จาก Sheet ให้ใช้, ถ้าไม่มีใช้ค่าเริ่มต้น
                if (data.profile.imageUrl && data.profile.imageUrl.trim() !== '') {
                    state.profile.imageUrl = data.profile.imageUrl;
                }
                
                els.profName.textContent = state.profile.name;
                els.profBio.textContent = data.profile.bio || '';
                
                // แก้ปัญหารูปไม่โหลดด้วยการเช็ค Error แล้วสลับไปใช้รูปสำรอง
                const imgObj = new Image();
                imgObj.onload = () => { els.profImg.src = state.profile.imageUrl; };
                imgObj.onerror = () => { els.profImg.src = "https://ui-avatars.com/api/?name=KM&background=1d9bf0&color=fff"; };
                imgObj.src = state.profile.imageUrl;
            }

            // 2. จัดการสิทธิ์ Admin
            if (userEmail && data.user) {
                state.isLoggedIn = true;
                state.currentUser = { email: data.user.email, role: data.user.role, pic: userPic };
                els.loginBtn.innerText = 'Sign Out';
                
                if (data.user.role === 'admin') {
                    els.creatorBox.style.display = 'block';
                    els.creatorAvatar.src = userPic || state.profile.imageUrl;
                } else {
                    els.creatorBox.style.display = 'none';
                    alert('คุณไม่มีสิทธิ์โพสต์ (สิทธิ์: อ่านได้อย่างเดียว)');
                }
            }

            // 3. เรนเดอร์ Feed
            if (data.posts) {
                state.posts = data.posts;
                renderFeed();
            } else {
                renderFeed(); // กรณีไม่มีโพสต์เลย
            }

        } catch (err) {
            console.error('Fetch Error:', err);
            els.feed.innerHTML = `
                <div class="status-message" style="color: var(--danger);">
                    <i class="fas fa-exclamation-triangle" style="font-size: 24px; margin-bottom: 12px;"></i><br>
                    โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่อีกครั้ง
                </div>
            `;
        }
    }

    // --- Render Feed ---
    function renderFeed() {
        if (!state.posts || state.posts.length === 0) {
            els.feed.innerHTML = `
                <div class="status-message">
                    ยังไม่มีโพสต์ในไทม์ไลน์
                </div>
            `;
            return;
        }

        let html = '';
        state.posts.forEach(post => {
            // วันที่แบบสั้นๆ สไตล์ Social Media
            const dateObj = new Date(post.timestamp);
            const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
            
            // เอารูป Profile หลักมาโชว์ในโพสต์เลย (เพราะเว็บนี้เป็น Personal space)
            const avatarSrc = state.profile.imageUrl;
            const authorName = state.profile.name;

            html += `
                <article class="post-card">
                    <img src="${avatarSrc}" class="post-card-avatar" alt="Avatar" onerror="this.src='https://ui-avatars.com/api/?name=KM&background=16181c&color=e7e9ea'">
                    <div class="post-card-content">
                        <div class="post-card-header">
                            <span class="post-card-name">${authorName}</span>
                            <i class="fas fa-certificate verified-badge" style="font-size: 0.85rem;"></i>
                            <span class="post-card-time">· ${dateStr}</span>
                        </div>
                        <div class="post-card-text">${escapeHTML(post.content)}</div>
                    </div>
                </article>
            `;
        });
        
        els.feed.innerHTML = html;
    }

    // --- Submit Post ---
    async function submitPost() {
        const content = els.postInput.value.trim();
        
        if (!content) return;
        if (!state.isLoggedIn || state.currentUser.role !== 'admin') {
            alert('สิทธิ์ไม่เพียงพอ');
            return;
        }

        // โหมดกำลังโหลด
        els.postSubmit.innerText = "กำลังโพสต์...";
        els.postSubmit.disabled = true;
        els.postInput.disabled = true;

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'addPost');
            formData.append('email', state.currentUser.email);
            formData.append('content', content);

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await res.json();

            if (result.success) {
                els.postInput.value = '';
                els.postInput.style.height = 'auto'; // รีเซ็ตความสูง
                // รีโหลดฟีดใหม่เงียบๆ (ไม่โชว์ Spinner เต็มจอ)
                await loadData(state.currentUser.email, state.currentUser.pic);
            } else {
                alert('โพสต์ล้มเหลว: ' + (result.message || 'Unknown'));
            }
        } catch (err) {
            console.error(err);
            alert('ข้อผิดพลาดการเชื่อมต่อ');
        } finally {
            els.postSubmit.innerText = "Post";
            els.postSubmit.disabled = false;
            els.postInput.disabled = false;
            els.postInput.focus();
        }
    }

    // --- Init ---
    // โหลดข้อมูลเริ่มต้น (แบบยังไม่ Login)
    loadData();
    </script>
</body>
</html>
