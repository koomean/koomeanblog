<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koo Mean Space</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #000000; --card-bg: #16181c; --border-color: #2f3336;
            --text-main: #e7e9ea; --text-muted: #71767b; --accent: #1d9bf0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        
        .main-container { width: 100%; max-width: 600px; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); min-height: 100vh; padding-bottom: 80px;}
        
        /* Header & Profile */
        .header { backdrop-filter: blur(12px); background-color: rgba(0,0,0,0.65); position: sticky; top: 0; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border-color); z-index: 10; display: flex; justify-content: space-between; align-items: center;}
        .profile-section { padding: 20px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--bg-color); object-fit: cover; margin-top: -10px; margin-bottom: 10px;}
        .profile-name { font-size: 1.5rem; font-weight: 800; }
        .profile-bio { color: var(--text-muted); margin-top: 5px; font-size: 0.95rem; }

        /* Post Creator (เฉพาะ Admin) */
        .post-creator { padding: 20px; border-bottom: 1px solid var(--border-color); display: none; }
        .creator-layout { display: flex; gap: 15px; }
        .creator-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .creator-input { flex: 1; }
        textarea { width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.2rem; resize: none; outline: none; font-family: inherit; margin-top: 10px; }
        .post-btn-container { display: flex; justify-content: flex-end; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .post-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .post-btn:hover { background: #1a8cd8; }
        .post-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Feed */
        .feed-container { display: flex; flex-direction: column; }
        .post-card { padding: 20px; border-bottom: 1px solid var(--border-color); transition: background-color 0.2s; }
        .post-card:hover { background-color: rgba(255,255,255,0.03); }
        .post-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-author { font-weight: 700; color: var(--text-main); font-size: 1rem; display: flex; align-items: center; gap: 5px;}
        .post-time { color: var(--text-muted); font-size: 0.85rem; font-weight: normal;}
        .post-content { font-size: 1rem; line-height: 1.5; color: var(--text-main); white-space: pre-wrap; margin-left: 52px; }

        /* Login Modal & Buttons */
        .admin-login-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .admin-login-btn:hover { background: rgba(255,255,255,0.1); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(91, 112, 131, 0.4); justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid var(--accent); width: 30px; height: 30px; animation: spin 1s infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <div>Koo Mean Space</div>
            <button class="admin-login-btn" id="loginToggleBtn">Login</button>
        </div>

        <div class="profile-section">
            <img src="https://ui-avatars.com/api/?name=M&background=random" class="profile-img" id="main-profile-img">
            <div class="profile-name" id="profile-name">Koo Mean</div>
            <div class="profile-bio" id="profile-bio">Welcome to my space</div>
        </div>

        <div class="post-creator" id="post-creator">
            <div class="creator-layout">
                <img src="" class="creator-avatar" id="creator-avatar">
                <div class="creator-input">
                    <textarea id="new-post-content" rows="3" placeholder="What is happening?!"></textarea>
                    <div class="post-btn-container">
                        <button class="post-btn" id="submit-post-btn" onclick="submitPost()">Post</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="feed-container" id="feed-container">
            <div class="loader" id="feed-loader"></div>
            <p id="feed-status" style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">กำลังโหลด...</p>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Admin Sign In</h2>
            <div style="display: flex; justify-content: center;">
                <div id="g_id_onload"
                    data-client_id="906677442222-kmjgsmta70n24aoaq7osm9c1l7g1fb89.apps.googleusercontent.com"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
            <button onclick="document.getElementById('login-modal').style.display='none'" style="margin-top: 20px; background: transparent; border: none; color: var(--text-muted); cursor: pointer;">ปิด</button>
        </div>
    </div>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyNoUFK4qqqYQ4c11vVyugVKk5qzF6fQcdoL1cQL-PbSVIeE2FpO5-56YVHB9cZxjaS0w/exec";
    
    let state = { isLoggedIn: false, currentUser: null, profile: {}, posts: [] };

    function decodeJwt(token) {
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join('')));
        } catch { return null; }
    }

    document.getElementById('loginToggleBtn').addEventListener('click', () => {
        if (!state.isLoggedIn) {
            document.getElementById('login-modal').style.display = 'flex';
        } else {
            if(confirm("Logout?")) {
                state.isLoggedIn = false;
                state.currentUser = null;
                document.getElementById('loginToggleBtn').innerText = 'Login';
                document.getElementById('post-creator').style.display = 'none';
            }
        }
    });

    function handleCredentialResponse(res) {
        const payload = decodeJwt(res.credential);
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('feed-loader').style.display = 'block';
        document.getElementById('feed-container').innerHTML = '<div class="loader" id="feed-loader"></div><p style="text-align: center; color: var(--text-muted);">กำลังตรวจสอบสิทธิ์...</p>';
        loadData(payload.email, payload.picture);
    }

    async function loadData(userEmail = '', userPic = '') {
        try {
            let url = API_URL;
            if (userEmail) url += `?email=${encodeURIComponent(userEmail)}`;

            const res = await fetch(url);
            const data = await res.json();

            // เช็คและแสดงผล Profile
            if (data.profile) {
                state.profile = data.profile;
                document.getElementById('profile-name').textContent = data.profile.name || 'Koo Mean';
                document.getElementById('profile-bio').textContent = data.profile.bio || '';
                if(data.profile.imageUrl) document.getElementById('main-profile-img').src = data.profile.imageUrl;
            }

            // จัดการสิทธิ์เมื่อ Login
            if (userEmail && data.user) {
                state.isLoggedIn = true;
                state.currentUser = { email: data.user.email, role: data.user.role, pic: userPic };
                document.getElementById('loginToggleBtn').innerText = 'Logout';
                
                // เปิดกล่องโพสต์ถ้าเป็น Admin
                if (data.user.role === 'admin') {
                    document.getElementById('post-creator').style.display = 'block';
                    document.getElementById('creator-avatar').src = userPic;
                } else {
                    alert('อีเมลนี้ไม่ใช่ Admin ไม่สามารถโพสต์ได้ครับ');
                }
            }

            // แสดง Feed
            if (data.posts) {
                state.posts = data.posts;
                renderFeed();
            }

        } catch (err) {
            console.error('Error:', err);
            document.getElementById('feed-container').innerHTML = '<p style="color:var(--accent); text-align:center;">โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรช</p>';
        }
    }

    function renderFeed() {
        const container = document.getElementById('feed-container');
        if (state.posts.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">ยังไม่มีการอัปเดต</p>';
            return;
        }

        let html = '';
        state.posts.forEach(post => {
            const date = new Date(post.timestamp).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
            html += `
                <div class="post-card">
                    <div class="post-header">
                        <img src="${state.profile.imageUrl || 'https://ui-avatars.com/api/?name=M&background=random'}" class="post-avatar">
                        <div>
                            <div class="post-author">${state.profile.name || 'Koo Mean'} <i class="fas fa-certificate" style="color: var(--accent); font-size: 0.9rem;"></i></div>
                            <div class="post-time">${date}</div>
                        </div>
                    </div>
                    <div class="post-content">${post.content}</div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    async function submitPost() {
        const contentBox = document.getElementById('new-post-content');
        const content = contentBox.value.trim();
        const btn = document.getElementById('submit-post-btn');

        if (!content) return;
        if (!state.isLoggedIn || state.currentUser.role !== 'admin') return alert('Unauthorized');

        btn.innerText = "Posting...";
        btn.disabled = true;

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'addPost');
            formData.append('email', state.currentUser.email);
            formData.append('content', content);

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await res.json();

            if (result.success) {
                contentBox.value = '';
                // ดึงฟีดใหม่มาแสดงทันที
                loadData(state.currentUser.email, state.currentUser.pic);
            } else {
                alert('Posting failed.');
            }
        } catch (err) {
            alert('Connection error.');
        } finally {
            btn.innerText = "Post";
            btn.disabled = false;
        }
    }

    // โหลดหน้าเว็บครั้งแรก
    loadData();
    </script>
</body>
</html>
