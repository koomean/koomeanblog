<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="web-title">Koo Mean Space</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-body: #000000; --bg-container: #000000;
            --bg-card: #0f1117; --bg-card-hover: #141820;
            --border: #1e2330; --border-subtle: #161b26;
            --text-primary: #e8eaf0; --text-secondary: #5a6478; --text-muted: #3a4155;
            --accent: #4f8ef7; --accent-hover: #3a7be8; --accent-glow: rgba(79, 142, 247, 0.15);
            --like-color: #f91880; /* สีชมพูสำหรับปุ่มหัวใจ */
            --glass-bg: rgba(0, 0, 0, 0.75); --glass-blur: blur(16px);
            --radius-full: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-primary); display: flex; justify-content: center; min-height: 100vh; overflow-y: scroll; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background-color: var(--bg-container); border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        @media (max-width: 600px) { .app-container { border: none; } }

        /* Header */
        .header { position: sticky; top: 0; z-index: 50; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); padding: 13px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: #fff; font-family: 'Sora', sans-serif; }
        .header-title { font-size: 1.05rem; font-weight: 700; font-family: 'Sora', sans-serif; }
        .auth-btn { background: transparent; color: var(--text-primary); border: 1px solid var(--border); padding: 7px 18px; border-radius: var(--radius-full); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .auth-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .auth-btn.signed-in { border-color: var(--text-secondary); color: var(--text-secondary); }

        /* Profile */
        .profile-header { position: relative; border-bottom: 1px solid var(--border); }
        .profile-cover { height: 155px; background-color: #0d1a3a; background-size: cover; background-position: center; position: relative; }
        @media (max-width: 600px) { .profile-cover { height: 120px; } }
        .profile-info-wrap { padding: 12px 18px 18px; position: relative; }
        
        .profile-avatar-wrap { position: absolute; top: -66px; left: 18px; border-radius: 50%; padding: 4px; background: var(--bg-container); }
        @media (max-width: 600px) { .profile-avatar-wrap { top: -50px; left: 14px; } }
        
        .profile-avatar { width: 116px; height: 116px; border-radius: 50%; object-fit: cover; display: block; border: 2px solid var(--border); background-color: #1a2040; }
        @media (max-width: 600px) { .profile-avatar { width: 88px; height: 88px; } }

        .profile-text-content { margin-top: 58px; }
        @media (max-width: 600px) { .profile-text-content { margin-top: 42px; } }
        .profile-name { font-size: 1.3rem; font-weight: 800; font-family: 'Sora', sans-serif; }
        .verified-badge { color: var(--accent); font-size: 1rem; margin-left: 4px; }
        .profile-handle { color: var(--text-secondary); font-size: 0.875rem; margin-top: 2px; }
        .profile-bio { margin-top: 10px; font-size: 0.95rem; line-height: 1.5; color: var(--text-primary); }

        /* Post Creator */
        .post-creator { padding: 14px 18px; border-bottom: 1px solid var(--border); display: none; background: linear-gradient(180deg, #060b18 0%, transparent 100%); }
        .creator-flex { display: flex; gap: 12px; }
        .creator-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--bg-card); }
        .creator-input-area { flex: 1; }
        .creator-textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 1.05rem; line-height: 1.5; resize: none; outline: none; min-height: 50px; padding-top: 10px; }
        .creator-footer { display: flex; justify-content: flex-end; align-items: center; margin-top: 10px; border-top: 1px solid var(--border-subtle); padding-top: 10px;}
        .btn-post { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-full); padding: 8px 20px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-post:hover { background: var(--accent-hover); }
        .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Feed & Post Card */
        .feed-container { flex: 1; padding-bottom: 60px; }
        .post-card { padding: 16px 18px; border-bottom: 1px solid var(--border-subtle); cursor: default; }
        .post-card-inner { display: flex; gap: 12px; }
        .post-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--bg-card); }
        .post-card-content { flex: 1; min-width: 0; }
        .post-card-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .post-card-name { font-weight: 700; font-size: 0.95rem; }
        .post-card-time { color: var(--text-secondary); font-size: 0.85rem; }
        .post-card-text { font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        
        /* Action Buttons (Like / Comment) */
        .post-card-actions { display: flex; gap: 25px; margin-top: 12px; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: 0.2s; background: transparent; border: none; outline: none; font-family: inherit;}
        .action-btn:hover { color: var(--accent); }
        .action-btn.liked { color: var(--like-color); }
        .action-btn.liked:hover { color: #f91880cc; }
        .action-btn i { font-size: 1rem; }

        /* Comments Section */
        .comments-section { margin-top: 15px; border-top: 1px dashed var(--border-subtle); padding-top: 15px; display: none; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .comment-box { background: var(--bg-card); padding: 10px 12px; border-radius: 12px; flex: 1; }
        .comment-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 3px; color: var(--text-secondary);}
        .comment-text { font-size: 0.9rem; line-height: 1.4; }
        
        .comment-input-area { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .comment-input { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 10px 15px; border-radius: var(--radius-full); font-size: 0.9rem; outline: none; }
        .comment-input:focus { border-color: var(--accent); }
        .btn-comment { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-full); font-weight: 600; cursor: pointer; }
        
        /* Modal & Loader */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 340px; padding: 32px 24px; text-align: center; }
        .modal-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; }
        .loader { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Toast */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 10px 20px; border-radius: var(--radius-full); font-size: 0.85rem; z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>
    <div class="app-container">

        <header class="header">
            <div class="header-left">
                <div class="header-logo">KM</div>
                <div class="header-title" id="header-title-text">Space</div>
            </div>
            <button class="auth-btn" id="loginToggleBtn">Sign In</button>
        </header>

        <section class="profile-header">
            <div class="profile-cover" id="profile-cover"></div>
            <div class="profile-info-wrap">
                <div class="profile-avatar-wrap">
                    <img src="https://ui-avatars.com/api/?name=KM" id="main-profile-img" class="profile-avatar" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=KM&background=1e2330&color=fff'">
                </div>
                <div class="profile-text-content">
                    <div style="display: flex; align-items: center;">
                        <h1 class="profile-name" id="profile-name-text">Loading...</h1>
                        <i class="fas fa-certificate verified-badge"></i>
                    </div>
                    <div class="profile-handle" id="profile-handle">@koomean</div>
                    <div class="profile-bio" id="profile-bio">...</div>
                </div>
            </div>
        </section>

        <section class="post-creator" id="post-creator">
            <div class="creator-flex">
                <img src="" class="creator-avatar" id="creator-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Admin'">
                <div class="creator-input-area">
                    <textarea id="new-post-content" class="creator-textarea" placeholder="คุณมีน มีอะไรอัปเดตไหมครับ..." maxlength="500"></textarea>
                    <div class="creator-footer">
                        <button class="btn-post" id="submit-post-btn" onclick="submitPost()">Post</button>
                    </div>
                </div>
            </div>
        </section>

        <main class="feed-container" id="feed-container">
            <div class="loader"></div>
        </main>
    </div>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-box">
            <h2 class="modal-title" id="modal-title">Sign In เพื่อใช้งานเต็มรูปแบบ</h2>
            <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 20px;">
                (Admin สำหรับโพสต์ / คนทั่วไปสำหรับกดไลก์และคอมเมนต์)
            </p>
            <div style="display: flex; justify-content: center; width: 100%;">
                <div id="g_id_onload"
                    data-client_id="906677442222-kmjgsmta70n24aoaq7osm9c1l7g1fb89.apps.googleusercontent.com"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>
            </div>
            <button onclick="document.getElementById('login-modal').classList.remove('show')" style="margin-top: 20px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // --- Config ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwBYhFTW68AfN4cYUJYS1DG7vw-Ocykx5kslSUQIeJJlfu0oeBIdi9xAhVmorVWQ4q7rg/exec";
    const SESSION_KEY = 'koomean_space_session';

    let state = { isLoggedIn: false, currentUser: null, spaceProfile: { name: 'Koo Mean', imageUrl: '', coverUrl: '' }, posts: [] };

    // --- DOM Refs ---
    const els = {
        webTitleTag: document.getElementById('web-title'),
        headerTitle: document.getElementById('header-title-text'),
        loginBtn: document.getElementById('loginToggleBtn'),
        modal: document.getElementById('login-modal'),
        creatorBox: document.getElementById('post-creator'),
        creatorAvatar: document.getElementById('creator-avatar'),
        postInput: document.getElementById('new-post-content'),
        postSubmit: document.getElementById('submit-post-btn'),
        feed: document.getElementById('feed-container'),
        profImg: document.getElementById('main-profile-img'),
        profCover: document.getElementById('profile-cover'),
        profName: document.getElementById('profile-name-text'),
        profBio: document.getElementById('profile-bio'),
        toast: document.getElementById('toast'),
    };

    function showToast(msg) {
        els.toast.textContent = msg;
        els.toast.classList.add('show');
        setTimeout(() => els.toast.classList.remove('show'), 3000);
    }

    function decodeJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        } catch { return null; }
    }

    function escapeHTML(str) {
        if (!str) return '';
        const p = document.createElement('p'); p.textContent = str; return p.innerHTML;
    }

    function formatDate(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    }

    // --- Auth Logic ---
    els.loginBtn.addEventListener('click', () => {
        if (!state.isLoggedIn) els.modal.classList.add('show');
        else if (confirm('ออกจากระบบหรือไม่?')) {
            state.isLoggedIn = false;
            state.currentUser = null;
            localStorage.removeItem(SESSION_KEY);
            els.loginBtn.textContent = 'Sign In';
            els.loginBtn.classList.remove('signed-in');
            els.creatorBox.style.display = 'none';
            showToast('ออกจากระบบแล้ว');
            renderFeed(); // รีเฟรชปุ่มไลก์
        }
    });

    function handleCredentialResponse(res) {
        const payload = decodeJwt(res.credential);
        if (!payload) return;
        els.modal.classList.remove('show');
        showToast('กำลังเข้าสู่ระบบ...');
        loadData(payload.email, payload.name, payload.picture);
    }

    // --- Fetch Logic ---
    async function loadData(userEmail = '', userName = '', userPic = '') {
        try {
            let url = API_URL;
            if (userEmail) url += `?email=${encodeURIComponent(userEmail)}&name=${encodeURIComponent(userName)}`;

            const res = await fetch(url);
            const data = await res.json();

            // 1. โหลดข้อมูล Profile + รูป Cover/Avatar แบบตรงๆ
            if (data.spaceProfile) {
                const sp = data.spaceProfile;
                state.spaceProfile = sp;
                
                els.webTitleTag.textContent = sp.webTitle || 'Koo Mean Space';
                els.headerTitle.textContent = sp.webTitle || 'Space';
                els.profName.textContent = sp.name || 'Koo Mean';
                els.profBio.textContent = sp.bio || '';
                
                // โหลดรูปโปรไฟล์วงกลม (ใช้ onerror ถ้ารูปเสีย)
                if(sp.imageUrl) els.profImg.src = sp.imageUrl;
                
                // โหลดรูปปกหลัง
                if(sp.coverUrl) {
                    els.profCover.style.backgroundImage = `url(${sp.coverUrl})`;
                }
            }

            // 2. จัดการสิทธิ์การล็อกอิน (Admin vs คนทั่วไป)
            if (userEmail && data.user) {
                state.isLoggedIn = true;
                state.currentUser = { email: data.user.email, name: data.user.name, role: data.user.role, pic: userPic };
                localStorage.setItem(SESSION_KEY, JSON.stringify(state.currentUser));
                
                els.loginBtn.textContent = 'Sign Out';
                els.loginBtn.classList.add('signed-in');

                if (data.user.role === 'admin') {
                    els.creatorBox.style.display = 'block';
                    els.creatorAvatar.src = userPic;
                } else {
                    showToast('เข้าสู่ระบบสำเร็จ! (สิทธิ์ผู้ใช้ทั่วไป กดไลก์/คอมเมนต์ได้)');
                }
            }

            // 3. โหลดโพสต์มาแสดง
            state.posts = data.posts || [];
            renderFeed();

        } catch (err) {
            console.error('Fetch Error:', err);
            els.feed.innerHTML = `<div style="text-align:center; padding: 20px; color:var(--danger);">เชื่อมต่อข้อมูลไม่สำเร็จ</div>`;
        }
    }

    // --- Render Feed ---
    function renderFeed() {
        if (!state.posts.length) {
            els.feed.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-secondary);">ยังไม่มีโพสต์ใหม่</div>`;
            return;
        }

        let html = '';
        state.posts.forEach((post) => {
            const authorName = escapeHTML(state.spaceProfile.name || 'Koo Mean');
            const avatarSrc = escapeHTML(state.spaceProfile.imageUrl || 'https://ui-avatars.com/api/?name=KM');
            
            // เช็คว่า User ที่ล็อกอินอยู่ กดไลก์โพสต์นี้ไปหรือยัง
            const hasLiked = state.isLoggedIn && post.likes.includes(state.currentUser.email);
            const likeIcon = hasLiked ? 'fas fa-heart' : 'far fa-heart';
            const likeClass = hasLiked ? 'action-btn liked' : 'action-btn';

            // เรนเดอร์คอมเมนต์ที่มีอยู่
            let commentsHtml = '';
            if(post.comments && post.comments.length > 0) {
                post.comments.forEach(c => {
                    const cPic = escapeHTML(c.pic || 'https://ui-avatars.com/api/?name=' + c.name);
                    commentsHtml += `
                        <div class="comment-item">
                            <img src="${cPic}" class="comment-avatar" onerror="this.src='https://ui-avatars.com/api/?name=U'">
                            <div class="comment-box">
                                <div class="comment-name">${escapeHTML(c.name)}</div>
                                <div class="comment-text">${escapeHTML(c.text)}</div>
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="post-card">
                    <div class="post-card-inner">
                        <img src="${avatarSrc}" class="post-avatar" onerror="this.src='https://ui-avatars.com/api/?name=KM'">
                        <div class="post-card-content">
                            <div class="post-card-header">
                                <span class="post-card-name">${authorName} <i class="fas fa-certificate" style="color:var(--accent); font-size:0.8rem;"></i></span>
                                <span class="post-card-time">· ${formatDate(post.timestamp)}</span>
                            </div>
                            <div class="post-card-text">${escapeHTML(post.content)}</div>
                            
                            <div class="post-card-actions">
                                <button class="${likeClass}" onclick="toggleLike(${post.rowIdx})"><i class="${likeIcon}"></i> ${post.likes.length}</button>
                                <button class="action-btn" onclick="toggleCommentBox(${post.rowIdx})"><i class="far fa-comment"></i> ${post.comments.length}</button>
                            </div>

                            <div class="comments-section" id="comments-section-${post.rowIdx}">
                                ${commentsHtml}
                                <div class="comment-input-area">
                                    <input type="text" class="comment-input" id="comment-input-${post.rowIdx}" placeholder="แสดงความคิดเห็น..." ${!state.isLoggedIn ? 'disabled title="กรุณาล็อกอินก่อน"' : ''}>
                                    <button class="btn-comment" onclick="submitComment(${post.rowIdx})">ส่ง</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        els.feed.innerHTML = html;
    }

    // --- Interactive Actions ---
    
    // เปิด/ปิดกล่องคอมเมนต์
    function toggleCommentBox(rowIdx) {
        const box = document.getElementById(`comments-section-${rowIdx}`);
        if(box.style.display === 'block') box.style.display = 'none';
        else box.style.display = 'block';
    }

    // กดไลก์
    async function toggleLike(rowIdx) {
        if (!state.isLoggedIn) {
            els.modal.classList.add('show');
            return showToast('กรุณา Sign in ก่อนเพื่อกดไลก์ครับ');
        }
        
        // อัปเดต UI ล่วงหน้า (Optimistic Update) ให้ทันใจวัยรุ่น
        const post = state.posts.find(p => p.rowIdx === rowIdx);
        const emailIdx = post.likes.indexOf(state.currentUser.email);
        if (emailIdx > -1) post.likes.splice(emailIdx, 1); // เอาออก
        else post.likes.push(state.currentUser.email); // เพิ่ม
        renderFeed(); // รีเฟรชปุ่ม

        // ยิงข้อมูลไปเซฟหลังบ้าน
        const formData = new URLSearchParams({ action: 'toggleLike', email: state.currentUser.email, rowIdx: rowIdx });
        try {
            await fetch(API_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' }});
        } catch(e) { console.error('Like error'); }
    }

    // ส่งคอมเมนต์
    async function submitComment(rowIdx) {
        if (!state.isLoggedIn) {
            els.modal.classList.add('show');
            return showToast('กรุณา Sign in ก่อนคอมเมนต์ครับ');
        }

        const inputEl = document.getElementById(`comment-input-${rowIdx}`);
        const text = inputEl.value.trim();
        if(!text) return;

        inputEl.disabled = true;
        showToast('กำลังส่งคอมเมนต์...');

        const formData = new URLSearchParams({ 
            action: 'addComment', 
            email: state.currentUser.email,
            name: state.currentUser.name || 'User',
            pic: state.currentUser.pic || '',
            text: text,
            rowIdx: rowIdx 
        });

        try {
            const res = await fetch(API_URL, { method: 'POST', body: formData, headers: { 'Content-Type': 'application/x-www-form-urlencoded' }});
            const result = await res.json();
            if(result.success) {
                inputEl.value = '';
                await loadData(state.currentUser.email, state.currentUser.name, state.currentUser.pic); // รีโหลดฟีดใหม่
                document.getElementById(`comments-section-${rowIdx}`).style.display = 'block'; // เปิดกล่องไว้เหมือนเดิม
                showToast('ส่งคอมเมนต์สำเร็จ');
            }
        } catch(e) { 
            showToast('เกิดข้อผิดพลาดในการคอมเมนต์'); 
        } finally {
            inputEl.disabled = false;
        }
    }

    // ส่งโพสต์หลัก (Admin เท่านั้น)
    async function submitPost() {
        const content = els.postInput.value.trim();
        if (!content) return;
        if (!state.isLoggedIn || state.currentUser?.role !== 'admin') return;

        els.postSubmit.textContent = 'Posting...';
        els.postSubmit.disabled = true;
        els.postInput.disabled = true;

        try {
            const formData = new URLSearchParams({ action: 'addPost', email: state.currentUser.email, content: content });
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
            const result = await res.json();

            if (result.success) {
                els.postInput.value = '';
                showToast('โพสต์สำเร็จ!');
                await loadData(state.currentUser.email, state.currentUser.name, state.currentUser.pic);
            }
        } catch (err) {
            showToast('ข้อผิดพลาดการเชื่อมต่อ');
        } finally {
            els.postSubmit.textContent = 'Post';
            els.postSubmit.disabled = false;
            els.postInput.disabled = false;
        }
    }

    // --- Init ---
    (function init() {
        els.postInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
        
        const saved = localStorage.getItem(SESSION_KEY);
        if (saved) {
            const user = JSON.parse(saved);
            state.isLoggedIn = true;
            state.currentUser = user;
            loadData(user.email, user.name, user.pic);
        } else {
            loadData();
        }
    })();
    </script>
</body>
</html>
