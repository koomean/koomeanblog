<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="web-title">Koo Mean Space</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-body: #000000; --bg-container: #000000;
            --bg-card: #0f1117; --bg-card-hover: #141820;
            --border: #1e2330; --border-subtle: #161b26;
            --text-primary: #e8eaf0; --text-secondary: #5a6478; --text-muted: #3a4155;
            --accent: #4f8ef7; --accent-hover: #3a7be8; --accent-glow: rgba(79, 142, 247, 0.15);
            --like-color: #f91880; 
            --success: #22c97a; --danger: #ff4757;
            --glass-bg: rgba(0, 0, 0, 0.75); --glass-blur: blur(16px);
            --skeleton: #0f1420; --skeleton-shine: #1a2035;
            --radius-sm: 8px; --radius-md: 14px; --radius-full: 9999px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-primary); display: flex; justify-content: center; min-height: 100vh; overflow-y: scroll; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background-color: var(--bg-container); border-left: 1px solid var(--border); border-right: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        @media (max-width: 600px) { .app-container { border: none; } }

        /* ─── Header ─── */
        .header { position: sticky; top: 0; z-index: 50; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: 13px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; color: #fff; font-family: 'Sora', sans-serif; flex-shrink: 0; }
        .header-title { font-size: 1.05rem; font-weight: 700; font-family: 'Sora', sans-serif; letter-spacing: -0.3px;}
        .auth-btn { background: transparent; color: var(--text-primary); border: 1px solid var(--border); padding: 7px 18px; border-radius: var(--radius-full); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.1px;}
        .auth-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .auth-btn.signed-in { border-color: var(--text-secondary); color: var(--text-secondary); }
        .auth-btn.signed-in:hover { background: rgba(255, 71, 87, 0.1); border-color: var(--danger); color: var(--danger);}

        /* ─── Profile ─── */
        .profile-header { position: relative; border-bottom: 1px solid var(--border); }
        .profile-cover { height: 155px; background: linear-gradient(160deg, #0d1a3a 0%, #060c1a 50%, #000 100%); background-size: cover; background-position: center; position: relative; overflow: hidden; }
        .profile-cover::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 80% at 20% 50%, rgba(79, 142, 247, 0.12) 0%, transparent 70%), radial-gradient(ellipse 40% 60% at 80% 30%, rgba(167, 139, 250, 0.08) 0%, transparent 70%); }
        .profile-cover::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to top, var(--bg-container), transparent); }
        @media (max-width: 600px) { .profile-cover { height: 120px; } }
        
        .profile-info-wrap { padding: 12px 18px 18px; position: relative; }
        .profile-avatar-wrap { position: absolute; top: -66px; left: 18px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, var(--accent), #a78bfa); box-shadow: 0 0 0 3px var(--bg-container); }
        @media (max-width: 600px) { .profile-avatar-wrap { top: -50px; left: 14px; } }

        /* Image with skeleton */
        .img-wrapper { position: relative; border-radius: 50%; overflow: hidden; display: block; }
        .img-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: inherit; z-index: 1; transition: opacity 0.3s ease; }
        .img-skeleton.hidden { opacity: 0; pointer-events: none; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .img-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-card) 0%, #1a2040 100%); font-weight: 700; color: var(--text-secondary); font-family: 'Sora', sans-serif; z-index: 0; letter-spacing: -0.5px; }
        .profile-avatar { width: 116px; height: 116px; border-radius: 50%; object-fit: cover; display: block; position: relative; z-index: 2; opacity: 0; transition: opacity 0.3s ease; }
        .profile-avatar.loaded { opacity: 1; }
        @media (max-width: 600px) { .profile-avatar { width: 88px; height: 88px; } }

        .profile-text-content { margin-top: 58px; }
        @media (max-width: 600px) { .profile-text-content { margin-top: 42px; } }
        .profile-name-row { display: flex; align-items: center; gap: 6px; }
        .profile-name { font-size: 1.2rem; font-weight: 800; font-family: 'Sora', sans-serif; letter-spacing: -0.5px; line-height: 1.2; }
        .verified-badge { background: var(--accent); color: #fff; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; flex-shrink: 0; }
        .profile-handle { color: var(--text-secondary); font-size: 0.875rem; margin-top: 3px; letter-spacing: 0.2px; }
        .profile-bio { margin-top: 10px; font-size: 0.925rem; line-height: 1.55; color: var(--text-primary); opacity: 0.9; }
        .profile-stats { display: flex; gap: 18px; margin-top: 14px; }
        .stat-item { display: flex; gap: 4px; font-size: 0.875rem; }
        .stat-count { font-weight: 700; color: var(--text-primary); }
        .stat-label { color: var(--text-secondary); }

        .skel-line { background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; display: block; }

        /* ─── Post Creator (Admin Only) ─── */
        .post-creator { padding: 14px 18px; border-bottom: 1px solid var(--border); display: none; background: linear-gradient(180deg, #060b18 0%, transparent 100%); position: relative; }
        .post-creator::before { content: ''; position: absolute; top: 0; left: 18px; right: 18px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.3; }
        .creator-flex { display: flex; gap: 12px; }
        .creator-avatar-wrap { flex-shrink: 0; border-radius: 50%; padding: 2px; background: linear-gradient(135deg, var(--accent), #a78bfa); width: 42px; height: 42px; }
        .creator-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; display: block; background: var(--bg-card); }
        .creator-input-area { flex: 1; display: flex; flex-direction: column; }
        .creator-textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 1rem; font-family: 'DM Sans', sans-serif; line-height: 1.5; resize: none; outline: none; min-height: 48px; padding-top: 10px; }
        .creator-textarea::placeholder { color: var(--text-muted); }
        .creator-footer { display: flex; justify-content: flex-end; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-subtle); }
        .char-count { font-size: 0.8rem; color: var(--text-muted); margin-right: auto; }
        .char-count.warn { color: #f59e0b; } .char-count.danger { color: var(--danger); }
        .btn-post { background: linear-gradient(135deg, var(--accent), #6366f1); color: #fff; border: none; border-radius: var(--radius-full); padding: 8px 20px; font-weight: 700; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.2px; box-shadow: 0 2px 12px rgba(79, 142, 247, 0.25); }
        .btn-post:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(79, 142, 247, 0.4); }
        .btn-post:active { transform: translateY(0); }
        .btn-post:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ─── Feed ─── */
        .feed-container { flex: 1; padding-bottom: 60px; }
        .feed-divider { padding: 10px 18px 6px; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border-subtle); }

        .post-card { padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 12px; cursor: default; transition: background-color 0.18s ease; animation: fadeUp 0.35s ease both; }
        .post-card:hover { background-color: var(--bg-card-hover); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .post-avatar-wrap { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; position: relative; background: var(--bg-card); }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.3s ease; position: relative; z-index: 2; }
        .post-avatar.loaded { opacity: 1; }

        .post-card-content { flex: 1; min-width: 0; }
        .post-card-header { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
        .post-card-name { font-weight: 700; color: var(--text-primary); font-size: 0.925rem; letter-spacing: -0.2px; }
        .post-card-time { color: var(--text-secondary); font-size: 0.85rem; font-weight: 400; }
        .post-card-text { color: var(--text-primary); font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; opacity: 0.9; }
        
        .post-card-actions { display: flex; gap: 20px; margin-top: 12px; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.82rem; cursor: pointer; transition: color 0.18s; background: transparent; border: none; outline: none; font-family: inherit;}
        .action-btn i { font-size: 0.95rem; }
        .action-btn:hover { color: var(--accent); }
        .action-btn.liked { color: var(--like-color); }
        .action-btn.liked:hover { color: #f91880cc; }

        /* Comments Section */
        .comments-section { margin-top: 15px; border-top: 1px dashed var(--border-subtle); padding-top: 15px; display: none; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 12px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .comment-box { background: var(--bg-card); padding: 8px 12px; border-radius: 12px; flex: 1; border: 1px solid var(--border-subtle);}
        .comment-name { font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; color: var(--text-secondary);}
        .comment-text { font-size: 0.85rem; line-height: 1.4; color: var(--text-primary);}
        
        .comment-input-area { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .comment-input { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 8px 14px; border-radius: var(--radius-full); font-size: 0.85rem; outline: none; transition: 0.2s;}
        .comment-input:focus { border-color: var(--accent); }
        .btn-comment { background: var(--text-muted); color: white; border: none; padding: 6px 14px; border-radius: var(--radius-full); font-weight: 600; cursor: pointer; transition: 0.2s;}
        .comment-input:focus + .btn-comment { background: var(--accent); }

        /* Skeleton Posts */
        .skeleton-post { padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); display: flex; gap: 12px; animation: fadeUp 0.3s ease both; }
        .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(90deg, var(--skeleton) 25%, var(--skeleton-shine) 50%, var(--skeleton) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; flex-shrink: 0; }
        .skeleton-content { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

        /* Error/Status */
        .status-message { text-align: center; padding: 52px 20px; color: var(--text-secondary); font-size: 0.925rem; }
        .error-banner { margin: 12px 18px; padding: 12px 16px; background: rgba(255, 71, 87, 0.08); border: 1px solid rgba(255, 71, 87, 0.25); border-radius: var(--radius-sm); color: var(--danger); font-size: 0.875rem; display: flex; align-items: center; gap: 8px; }
        .btn-retry { margin-left: auto; background: transparent; border: 1px solid rgba(255, 71, 87, 0.4); color: var(--danger); padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
        .btn-retry:hover { background: rgba(255, 71, 87, 0.12); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.25s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 340px; padding: 32px 24px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.7); transform: translateY(24px) scale(0.97); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
        .modal-logo { width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; color: #fff; font-family: 'Sora', sans-serif; margin: 0 auto 18px; box-shadow: 0 4px 20px rgba(79, 142, 247, 0.3); }
        .modal-title { font-size: 1.15rem; font-weight: 700; font-family: 'Sora', sans-serif; margin-bottom: 6px; letter-spacing: -0.3px; color: var(--text-primary);}
        .modal-subtitle { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 24px; }
        .g_id_signin { display: flex; justify-content: center; width: 100%; }
        .btn-close-modal { margin-top: 20px; background: transparent; border: none; color: var(--text-secondary); font-weight: 600; font-size: 0.875rem; cursor: pointer; padding: 8px 18px; border-radius: var(--radius-full); transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-close-modal:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
        
        .ask-note-input { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 12px 15px; border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; margin-bottom: 15px; text-align: center;}
        .ask-note-input:focus { border-color: var(--accent); }
        .btn-submit-note { background: linear-gradient(135deg, var(--accent), #6366f1); color: #fff; border: none; border-radius: var(--radius-full); padding: 10px 20px; font-weight: 700; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%;}

        /* Toast */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 12px 22px; border-radius: var(--radius-full); font-size: 0.875rem; font-weight: 500; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.6); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s; opacity: 0; pointer-events: none; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
    </style>
</head>
<body>
    <div class="app-container">

        <header class="header">
            <div class="header-left">
                <div class="header-logo">KM</div>
                <div class="header-title" id="header-title-text">Space</div>
            </div>
            <button class="auth-btn" id="loginToggleBtn">Sign In</button>
        </header>

        <section class="profile-header">
            <div class="profile-cover" id="profile-cover"></div>
            <div class="profile-info-wrap">
                <div class="profile-avatar-wrap">
                    <div class="img-wrapper" style="width:116px;height:116px;" id="main-avatar-wrapper">
                        <div class="img-skeleton" id="main-avatar-skeleton"></div>
                        <div class="img-fallback" id="main-avatar-fallback" style="font-size:1.8rem;">KM</div>
                        <img id="main-profile-img" class="profile-avatar" alt="Profile">
                    </div>
                </div>
                <div class="profile-text-content">
                    <div class="profile-name-row">
                        <h1 class="profile-name" id="profile-name-text"><span class="skel-line" style="width:120px;height:20px;display:inline-block;"></span></h1>
                        <div class="verified-badge"><i class="fas fa-check" style="font-size:0.5rem;"></i></div>
                    </div>
                    <div class="profile-handle" id="profile-handle">@koomean</div>
                    <div class="profile-bio" id="profile-bio">
                        <span class="skel-line" style="width:100%;height:13px;display:block;margin-top:6px;"></span>
                        <span class="skel-line" style="width:70%;height:13px;display:block;margin-top:6px;"></span>
                    </div>
                    <div class="profile-stats" id="profile-stats" style="display:none;">
                        <div class="stat-item"><span class="stat-count" id="stat-posts">0</span><span class="stat-label">โพสต์</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="post-creator" id="post-creator">
            <div class="creator-flex">
                <div class="creator-avatar-wrap">
                    <img src="" alt="Admin" class="creator-avatar" id="creator-avatar" onerror="this.src='https://ui-avatars.com/api/?name=A&background=1a2040&color=4f8ef7&size=80'">
                </div>
                <div class="creator-input-area">
                    <textarea id="new-post-content" class="creator-textarea" placeholder="คุณกำลังคิดอะไรอยู่..." maxlength="500"></textarea>
                    <div class="creator-footer">
                        <span class="char-count" id="char-count">0 / 500</span>
                        <button class="btn-post" id="submit-post-btn" onclick="submitPost()">Post</button>
                    </div>
                </div>
            </div>
        </section>

        <main class="feed-container" id="feed-container">
            <div class="feed-divider">Timeline</div>
            <div id="skeleton-posts">
                ${[...Array(3)].map((_, i) => `
                <div class="skeleton-post" style="animation-delay:${i * 0.06}s">
                    <div class="skeleton-avatar"></div>
                    <div class="skeleton-content">
                        <span class="skel-line" style="width:${40 + Math.random() * 30}%;height:13px;"></span>
                        <span class="skel-line" style="width:100%;height:13px;"></span>
                        <span class="skel-line" style="width:${60 + Math.random() * 30}%;height:13px;"></span>
                    </div>
                </div>`).join('')}
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="login-modal">
        <div class="modal-box">
            <div class="modal-logo">KM</div>
            <h2 class="modal-title">Sign In</h2>
            <p class="modal-subtitle">เข้าสู่ระบบเพื่อกดไลก์และคอมเมนต์</p>
            <div id="g_id_onload" data-client_id="906677442222-kmjgsmta70n24aoaq7osm9c1l7g1fb89.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large"></div>
            <button class="btn-close-modal" id="close-modal-btn">ยกเลิก</button>
        </div>
    </div>

    <div class="modal-overlay" id="ask-note-modal">
        <div class="modal-box" style="max-width: 400px;">
            <div class="modal-logo" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);"><i class="fas fa-hand-sparkles"></i></div>
            <h2 class="modal-title">ยินดีต้อนรับผู้ใช้ใหม่!</h2>
            <p class="modal-subtitle">กรุณาพิมพ์แนะนำตัวสั้นๆ เพื่อให้ Admin ทราบ</p>
            <input type="text" id="new-user-note" class="ask-note-input" placeholder="เช่น: ผมเป็นเพื่อนคุณมีนครับ">
            <button class="btn-submit-note" id="submit-note-btn">ลงทะเบียน & เข้าใช้งาน</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ─── Config ───────────────────────────────────────────────────────────────
    const API_URL = "https://script.google.com/macros/s/AKfycbwBYhFTW68AfN4cYUJYS1DG7vw-Ocykx5kslSUQIeJJlfu0oeBIdi9xAhVmorVWQ4q7rg/exec";
    const SESSION_KEY = 'koomean_space_session';
    const FETCH_TIMEOUT = 12000;

    // ─── State ────────────────────────────────────────────────────────────────
    let state = {
        isLoggedIn: false, currentUser: null, pendingPayload: null,
        spaceProfile: { webTitle: 'Space', name: 'Loading...', imageUrl: '', bio: '', coverUrl: '' },
        posts: []
    };

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const els = {
        webTitleTag: $('web-title'), headerTitle: $('header-title-text'),
        loginBtn: $('loginToggleBtn'), modal: $('login-modal'), closeModal: $('close-modal-btn'),
        askNoteModal: $('ask-note-modal'), noteInput: $('new-user-note'), submitNoteBtn: $('submit-note-btn'),
        creatorBox: $('post-creator'), creatorAvatar: $('creator-avatar'), postInput: $('new-post-content'), postSubmit: $('submit-post-btn'),
        feed: $('feed-container'),
        profImg: $('main-profile-img'), profCover: $('profile-cover'), profName: $('profile-name-text'), profBio: $('profile-bio'), profHandle: $('profile-handle'), profStats: $('profile-stats'), statPosts: $('stat-posts'),
        charCount: $('char-count'), skeletonPosts: $('skeleton-posts'), toast: $('toast'),
        avatarSkeleton: $('main-avatar-skeleton'), avatarFallback: $('main-avatar-fallback'),
    };

    // ─── UI Utils ─────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '', icon = '') {
        clearTimeout(toastTimer);
        els.toast.className = 'toast' + (type ? ' ' + type : '');
        els.toast.innerHTML = (icon ? `<i class="${icon}"></i> ` : '') + msg;
        requestAnimationFrame(() => { requestAnimationFrame(() => els.toast.classList.add('show')); });
        toastTimer = setTimeout(() => els.toast.classList.remove('show'), 3000);
    }

    function loadImage(imgEl, src, skeletonEl, fallbackEl, initials = 'KM') {
        if (!src || src.trim() === '') {
            if (skeletonEl) skeletonEl.classList.add('hidden');
            if (fallbackEl) { fallbackEl.style.display = 'flex'; fallbackEl.textContent = initials; }
            return;
        }
        const img = new Image();
        img.onload = () => { imgEl.src = src; imgEl.classList.add('loaded'); if (skeletonEl) skeletonEl.classList.add('hidden'); if (fallbackEl) fallbackEl.style.display = 'none'; };
        img.onerror = () => { if (skeletonEl) skeletonEl.classList.add('hidden'); if (fallbackEl) { fallbackEl.style.display = 'flex'; fallbackEl.textContent = initials; } };
        img.src = src;
    }

    function decodeJwt(token) {
        try { return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } catch { return null; }
    }
    function escapeHTML(str) { if (!str) return ''; const p = document.createElement('p'); p.textContent = str; return p.innerHTML; }
    function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); }

    async function fetchWithTimeout(url, options = {}) {
        const ctrl = new AbortController(); const id = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT);
        try { const res = await fetch(url, { ...options, signal: ctrl.signal }); clearTimeout(id); return res; } catch (e) { clearTimeout(id); throw e; }
    }

    // ─── Events ─────────────────────────────────────────────────────────────
    els.postInput.addEventListener('input', function() {
        this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';
        const len = this.value.length;
        els.charCount.textContent = `${len} / 500`;
        els.charCount.className = 'char-count' + (len >= 450 ? ' danger' : len >= 350 ? ' warn' : '');
    });

    els.loginBtn.addEventListener('click', () => {
        if (!state.isLoggedIn) els.modal.classList.add('show');
        else if (confirm('ออกจากระบบหรือไม่?')) {
            state.isLoggedIn = false; state.currentUser = null; localStorage.removeItem(SESSION_KEY);
            els.loginBtn.textContent = 'Sign In'; els.loginBtn.className = 'auth-btn';
            els.creatorBox.style.display = 'none'; els.postInput.value = '';
            showToast('ออกจากระบบแล้ว', '', 'fas fa-sign-out-alt');
            renderFeed(); // อัปเดตปุ่มไลก์
        }
    });

    els.closeModal.addEventListener('click', () => els.modal.classList.remove('show'));
    
    // รับค่าจาก Google
    function handleCredentialResponse(res) {
        const payload = decodeJwt(res.credential);
        if (!payload) return;
        els.modal.classList.remove('show');
        state.pendingPayload = payload;
        showToast('กำลังตรวจสอบข้อมูล...', '', 'fas fa-spinner fa-spin');
        loadData(payload.email, payload.name, payload.picture);
    }

    // ส่ง Note สมัครสมาชิกใหม่
    els.submitNoteBtn.addEventListener('click', () => {
        const note = els.noteInput.value.trim();
        if(!note) return alert('กรุณากรอกข้อความสักนิดครับ');
        els.askNoteModal.classList.remove('show');
        showToast('กำลังลงทะเบียน...', '', 'fas fa-spinner fa-spin');
        loadData(state.pendingPayload.email, state.pendingPayload.name, state.pendingPayload.picture, note);
    });

    // ─── Data Fetching ────────────────────────────────────────────────────────
    async function loadData(userEmail = '', userName = '', userPic = '', userNote = null) {
        try {
            let url = API_URL;
            if (userEmail) {
                url += `?email=${encodeURIComponent(userEmail)}&name=${encodeURIComponent(userName)}`;
                if (userNote !== null) url += `&action=register&note=${encodeURIComponent(userNote)}`;
            }

            const res = await fetchWithTimeout(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            // เด้งหน้าต่างผู้ใช้ใหม่ ถ้าระบบหลังบ้านบอกว่ายังไม่เคยลงทะเบียน
            if (data.requireRegistration) {
                els.askNoteModal.classList.add('show');
                return;
            }

            // 1. Profile
            if (data.spaceProfile) {
                const sp = data.spaceProfile;
                state.spaceProfile = sp;
                els.webTitleTag.textContent = sp.webTitle || 'Koo Mean Space';
                els.headerTitle.textContent = sp.webTitle || 'Space';
                els.profName.textContent = sp.name || 'Koo Mean';
                els.profBio.textContent = sp.bio || '';
                
                if(sp.coverUrl) els.profCover.style.backgroundImage = `url(${sp.coverUrl})`;
                const initials = (sp.name || 'KM').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
                loadImage(els.profImg, sp.imageUrl, els.avatarSkeleton, els.avatarFallback, initials);
            }

            // 2. Auth
            if (userEmail && data.user) {
                state.isLoggedIn = true;
                state.currentUser = { email: data.user.email, name: userName, role: data.user.role, pic: userPic };
                localStorage.setItem(SESSION_KEY, JSON.stringify(state.currentUser));
                els.loginBtn.textContent = 'Sign Out'; els.loginBtn.className = 'auth-btn signed-in';

                if (data.user.role === 'admin') {
                    els.creatorBox.style.display = 'block'; els.creatorAvatar.src = userPic || '';
                    showToast('เข้าสู่ระบบ Admin สำเร็จ ✓', 'success');
                } else {
                    showToast('เข้าสู่ระบบสำเร็จ (กดไลก์/คอมเมนต์ได้) ✓', 'success');
                }
            }

            // 3. Posts
            state.posts = data.posts || [];
            if (state.posts.length > 0) { els.statPosts.textContent = state.posts.length; els.profStats.style.display = 'flex'; }
            renderFeed();

        } catch (err) {
            console.error('Fetch Error:', err);
            if(els.skeletonPosts) els.skeletonPosts.style.display = 'none';
            els.feed.innerHTML = `<div class="error-banner"><i class="fas fa-exclamation-circle"></i><span>โหลดข้อมูลไม่สำเร็จ</span><button class="btn-retry" onclick="location.reload()">ลองใหม่</button></div>`;
        }
    }

    // ─── Render Feed ──────────────────────────────────────────────────────────
    function renderFeed() {
        if (els.skeletonPosts) els.skeletonPosts.style.display = 'none';
        const existing = els.feed.querySelectorAll('.post-card, .status-message, .error-banner');
        existing.forEach(el => el.remove());

        if (!state.posts.length) {
            els.feed.innerHTML += `<div class="status-message"><div style="font-size:2rem; opacity:0.4; margin-bottom:10px;">💬</div>ยังไม่มีโพสต์ในไทม์ไลน์</div>`;
            return;
        }

        const authorName = escapeHTML(state.spaceProfile.name || 'Koo Mean');
        const avatarSrc = escapeHTML(state.spaceProfile.imageUrl || '');
        const initials = authorName.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

        state.posts.forEach((post, i) => {
            const article = document.createElement('article');
            article.className = 'post-card';
            article.style.animationDelay = `${i * 0.05}s`;

            const hasLiked = state.isLoggedIn && post.likes.includes(state.currentUser.email);
            const likeIcon = hasLiked ? 'fas fa-heart' : 'far fa-heart';
            const likeClass = hasLiked ? 'action-btn liked' : 'action-btn';

            let commentsHtml = '';
            if(post.comments && post.comments.length > 0) {
                post.comments.forEach(c => {
                    const cPic = escapeHTML(c.pic || 'https://ui-avatars.com/api/?name=' + c.name);
                    commentsHtml += `<div class="comment-item"><img src="${cPic}" class="comment-avatar" onerror="this.src='https://ui-avatars.com/api/?name=U'"><div class="comment-box"><div class="comment-name">${escapeHTML(c.name)}</div><div class="comment-text">${escapeHTML(c.text)}</div></div></div>`;
                });
            }

            article.innerHTML = `
                <div class="post-avatar-wrap">
                    <div class="img-fallback" style="font-size:0.85rem;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${initials}</div>
                    <img class="post-avatar loaded" src="${avatarSrc}" onerror="this.style.display='none'">
                </div>
                <div class="post-card-content">
                    <div class="post-card-header">
                        <span class="post-card-name">${authorName}</span>
                        <div class="verified-badge"><i class="fas fa-check"></i></div>
                        <span class="post-card-time">· ${formatDate(post.timestamp)}</span>
                    </div>
                    <div class="post-card-text">${escapeHTML(post.content)}</div>
                    
                    <div class="post-card-actions">
                        <button class="${likeClass}" onclick="toggleLike(${post.rowIdx})"><i class="${likeIcon}"></i> ${post.likes.length}</button>
                        <button class="action-btn" onclick="toggleCommentBox(${post.rowIdx})"><i class="far fa-comment"></i> ${post.comments.length}</button>
                    </div>

                    <div class="comments-section" id="comments-section-${post.rowIdx}">
                        ${commentsHtml}
                        <div class="comment-input-area">
                            <input type="text" class="comment-input" id="comment-input-${post.rowIdx}" placeholder="แสดงความคิดเห็น..." ${!state.isLoggedIn ? 'disabled title="กรุณา Sign In ก่อน"' : ''}>
                            <button class="btn-comment" onclick="submitComment(${post.rowIdx})">ส่ง</button>
                        </div>
                    </div>
                </div>
            `;
            els.feed.appendChild(article);
        });
    }

    function toggleCommentBox(rowIdx) {
        const box = document.getElementById(`comments-section-${rowIdx}`);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function toggleLike(rowIdx) {
        if (!state.isLoggedIn) return els.modal.classList.add('show');
        
        const post = state.posts.find(p => p.rowIdx === rowIdx);
        const emailIdx = post.likes.indexOf(state.currentUser.email);
        if (emailIdx > -1) post.likes.splice(emailIdx, 1); else post.likes.push(state.currentUser.email);
        renderFeed();

        try { await fetch(API_URL, { method: 'POST', body: new URLSearchParams({ action: 'toggleLike', email: state.currentUser.email, rowIdx: rowIdx }), headers: { 'Content-Type': 'application/x-www-form-urlencoded' }}); } catch(e) {}
    }

    async function submitComment(rowIdx) {
        if (!state.isLoggedIn) return els.modal.classList.add('show');
        const inputEl = document.getElementById(`comment-input-${rowIdx}`);
        const text = inputEl.value.trim();
        if(!text) return;

        inputEl.disabled = true; showToast('กำลังส่ง...');
        try {
            const res = await fetch(API_URL, { method: 'POST', body: new URLSearchParams({ action: 'addComment', email: state.currentUser.email, name: state.currentUser.name || 'User', pic: state.currentUser.pic || '', text: text, rowIdx: rowIdx }), headers: { 'Content-Type': 'application/x-www-form-urlencoded' }});
            if((await res.json()).success) {
                inputEl.value = ''; await loadData(state.currentUser.email, state.currentUser.name, state.currentUser.pic, null);
                document.getElementById(`comments-section-${rowIdx}`).style.display = 'block';
            }
        } catch(e) { showToast('เกิดข้อผิดพลาด', 'error'); } finally { inputEl.disabled = false; }
    }

    async function submitPost() {
        const content = els.postInput.value.trim();
        if (!content || !state.isLoggedIn || state.currentUser?.role !== 'admin') return;

        els.postSubmit.textContent = '...'; els.postSubmit.disabled = true; els.postInput.disabled = true;
        try {
            const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ action: 'addPost', email: state.currentUser.email, content: content }) });
            if ((await res.json()).success) {
                els.postInput.value = ''; els.postInput.style.height = 'auto'; els.charCount.textContent = '0 / 500';
                showToast('โพสต์สำเร็จ!', 'success'); await loadData(state.currentUser.email, state.currentUser.name, state.currentUser.pic);
            }
        } catch (err) { showToast('เชื่อมต่อล้มเหลว', 'error'); } finally { els.postSubmit.textContent = 'Post'; els.postSubmit.disabled = false; els.postInput.disabled = false; }
    }

    // --- Init ---
    (function init() {
        const saved = localStorage.getItem(SESSION_KEY);
        if (saved) {
            const user = JSON.parse(saved); state.isLoggedIn = true; state.currentUser = user;
            els.loginBtn.textContent = 'Sign Out'; els.loginBtn.className = 'auth-btn signed-in';
            loadData(user.email, user.name, user.pic);
        } else loadData();
    })();
    </script>
</body>
</html>
